server {
    listen 80;
    server_name localhost;

    # Serve React frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Redirect all routes to index.html so React Router works correctly
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: forward /api/ requests to the backend container
    # "backend" is the service name defined in docker-compose.yml
    # Docker's internal DNS resolves "backend" to the correct container IP
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
