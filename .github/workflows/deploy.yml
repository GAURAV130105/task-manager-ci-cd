name: CI/CD — Build, Scan, and Deploy to Azure VM

# Trigger: runs automatically whenever code is pushed to the master branch
on:
  push:
    branches:
      - master

# ═══════════════════════════════════════════════════════════════
# JOB 1: SECURITY SCAN
# Runs first. If this fails, Job 2 (build & deploy) never starts.
# ═══════════════════════════════════════════════════════════════
jobs:
  security-scan:
    name: 🛡️ Security Scan (Secrets + Dependencies)
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────
      # STEP 1: Checkout with full git history
      # GitLeaks needs full history to scan all past commits
      # ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────────
      # STEP 2: GitLeaks — Secret Scanning
      # Scans the entire codebase for accidentally committed
      # secrets like API keys, passwords, private keys, tokens.
      # Fails the pipeline immediately if any secret is found.
      # ─────────────────────────────────────────────────
      - name: 🔍 GitLeaks — Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────
      # STEP 3: Set up Node.js for npm audit
      # ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─────────────────────────────────────────────────
      # STEP 4: npm audit — Backend
      # Checks all backend packages against the npm vulnerability
      # database. Reports HIGH and CRITICAL severity CVEs.
      # Uses || true so it reports but doesn't block the pipeline.
      # ─────────────────────────────────────────────────
      - name: 🔍 npm audit — Backend dependencies
        run: |
          echo "======================================"
          echo "  Backend Dependency Vulnerability Scan"
          echo "======================================"
          cd backend
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high || true

      # ─────────────────────────────────────────────────
      # STEP 5: npm audit — Frontend
      # Same vulnerability check for frontend packages.
      # ─────────────────────────────────────────────────
      - name: 🔍 npm audit — Frontend dependencies
        run: |
          echo "======================================"
          echo "  Frontend Dependency Vulnerability Scan"
          echo "======================================"
          cd frontend
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: BUILD, SCAN IMAGES & DEPLOY
  # Only runs if Job 1 (security-scan) passes successfully.
  # ═══════════════════════════════════════════════════════════════
  build-and-deploy:
    name: 🐳 Build, Scan Images and Deploy to Azure
    runs-on: ubuntu-latest
    needs: security-scan   # 👈 Depends on security-scan passing

    steps:
      # ─────────────────────────────────────────────────
      # STEP 1: Checkout repository
      # ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────
      # STEP 2: Set up Docker Buildx
      # ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────
      # STEP 3: Log in to Docker Hub
      # ─────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────────
      # STEP 4: Build backend image LOCALLY (don't push yet)
      # We load it into the local Docker daemon so Trivy
      # can scan it before it gets pushed to Docker Hub.
      # ─────────────────────────────────────────────────
      - name: Build backend image (local only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────────
      # STEP 5: Trivy — Scan backend Docker image
      # Scans for OS package and library vulnerabilities.
      # exit-code: 1 = fail the pipeline if CRITICAL CVEs found.
      # ignore-unfixed: true = skip vulnerabilities with no fix yet.
      # ─────────────────────────────────────────────────
      - name: 🔍 Trivy — Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      # ─────────────────────────────────────────────────
      # STEP 6: Push backend image to Docker Hub
      # Only reached if Trivy scan found NO CRITICAL issues.
      # ─────────────────────────────────────────────────
      - name: Push backend image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-backend:latest

      # ─────────────────────────────────────────────────
      # STEP 7: Build frontend image LOCALLY (don't push yet)
      # ─────────────────────────────────────────────────
      - name: Build frontend image (local only)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────────
      # STEP 8: Trivy — Scan frontend Docker image
      # ─────────────────────────────────────────────────
      - name: 🔍 Trivy — Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      # ─────────────────────────────────────────────────
      # STEP 9: Push frontend image to Docker Hub
      # Only reached if Trivy scan found NO CRITICAL issues.
      # ─────────────────────────────────────────────────
      - name: Push frontend image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-frontend:latest

      # ─────────────────────────────────────────────────
      # STEP 10: SSH into the Azure VM and deploy
      # ─────────────────────────────────────────────────
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            # Navigate to the project directory on the VM
            cd ~/task-manager-ci-cd

            # Pull the latest code from GitHub (to get updated docker-compose.yml)
            git pull origin master

            # Pull the newest Docker images from Docker Hub
            docker compose pull

            # Restart all containers with the new images (zero downtime swap)
            docker compose up -d --remove-orphans

            # Remove old/unused Docker images to free up disk space on the VM
            docker image prune -f

            echo "✅ Deployment complete! All security scans passed."
