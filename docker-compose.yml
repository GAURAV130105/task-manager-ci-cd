services:
  database:
    image: mongo:6.0
    container_name: task-manager-db
    restart: always
    volumes:
      # Persist MongoDB data even when containers are stopped/restarted
      - mongo_data:/data/db
    networks:
      - task_network

  backend:
    # Pull the pre-built image from Docker Hub (pushed by GitHub Actions)
    image: ${DOCKERHUB_USERNAME:-gaurav130105}/taskmanager-backend:latest
    container_name: task-manager-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # MONGODB_URI is loaded from the .env file on the server
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - database
    networks:
      - task_network

  frontend:
    # Pull the pre-built image from Docker Hub (pushed by GitHub Actions)
    image: ${DOCKERHUB_USERNAME:-gaurav130105}/taskmanager-frontend:latest
    container_name: task-manager-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - task_network

volumes:
  mongo_data:

networks:
  task_network:
    driver: bridge
