services:
  database:
    image: mongo:6.0
    container_name: task-manager-db
    restart: always
    volumes:
      # Persist MongoDB data even when containers are stopped/restarted
      - mongo_data:/data/db
    networks:
      - task_network

  backend:
    # Pull the pre-built image from Docker Hub (pushed by GitHub Actions)
    image: ${DOCKERHUB_USERNAME:-gaauraav13}/taskmanager-backend:latest
    container_name: task-manager-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # MONGODB_URI is loaded from the .env file on the server
      - MONGODB_URI=${MONGODB_URI}
      # JWT secret for signing auth tokens — change this in production!
      - JWT_SECRET=${JWT_SECRET:-taskflow_jwt_secret_change_in_production}
    depends_on:
      - database
    networks:
      - task_network

  frontend:
    # Pull the pre-built image from Docker Hub (pushed by GitHub Actions / Jenkins)
    image: ${DOCKERHUB_USERNAME:-gaauraav13}/taskmanager-frontend:latest
    container_name: task-manager-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"        # HTTPS port mapped for SSL traffic
    volumes:
      # Mount Let's Encrypt certificates from host VM into container (read-only)
      # Certbot stores certificates here after running: sudo certbot certonly
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - task_network

  # ─────────────────────────────────────────────
  # MONITORING STACK
  # ─────────────────────────────────────────────

  # Prometheus: Collects & stores time-series metrics from all targets
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      # Mount our custom scrape configuration
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Persist Prometheus data across container restarts
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - task_network

  # Grafana: Visualizes Prometheus data in beautiful dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Persist Grafana dashboards and settings
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - task_network

  # cAdvisor: Collects per-container metrics (CPU%, Memory, Network I/O)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - task_network

  # Node Exporter: Collects host VM metrics (Disk, RAM, CPU cores, uptime)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - task_network

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  task_network:
    driver: bridge
